name: Update Data And Deploy

"on":
  workflow_dispatch:
  repository_dispatch:
    types: [portfolio-results-ready]
  schedule:
    - cron: "0 12 * * *"
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  ingest-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download dispatched allure artifact by run id
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_artifact == 'allure-results' }}
        id: download-dispatch
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.SOURCE_REPO_TOKEN != '' && secrets.SOURCE_REPO_TOKEN || github.token }}
          repo: ${{ github.event.client_payload.source_repo }}
          workflow: ${{ github.event.client_payload.source_workflow }}
          run_id: ${{ github.event.client_payload.source_run_id }}
          name: ${{ github.event.client_payload.source_artifact || 'allure-results' }}
          path: incoming/allure-results
          if_no_artifact_found: fail

      - name: Download dispatched Playwright JSON artifact by run id
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_artifact == 'playwright-json' }}
        id: download-dispatch-playwright
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.SOURCE_REPO_TOKEN != '' && secrets.SOURCE_REPO_TOKEN || github.token }}
          repo: ${{ github.event.client_payload.source_repo }}
          workflow: ${{ github.event.client_payload.source_workflow }}
          run_id: ${{ github.event.client_payload.source_run_id }}
          name: playwright-json
          path: incoming/playwright-json
          if_no_artifact_found: fail

      - name: Download dispatched Selenium JSON artifact by run id
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_artifact == 'selenium-json' }}
        id: download-dispatch-selenium
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.SOURCE_REPO_TOKEN != '' && secrets.SOURCE_REPO_TOKEN || github.token }}
          repo: ${{ github.event.client_payload.source_repo }}
          workflow: ${{ github.event.client_payload.source_workflow }}
          run_id: ${{ github.event.client_payload.source_run_id }}
          name: selenium-json
          path: incoming/selenium-json
          if_no_artifact_found: fail

      - name: Download latest configured allure artifact
        if: ${{ github.event_name != 'repository_dispatch' && vars.SOURCE_REPO != '' && vars.SOURCE_WORKFLOW != '' }}
        id: download-configured
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.SOURCE_REPO_TOKEN != '' && secrets.SOURCE_REPO_TOKEN || github.token }}
          repo: ${{ vars.SOURCE_REPO }}
          workflow: ${{ vars.SOURCE_WORKFLOW }}
          branch: ${{ vars.SOURCE_BRANCH != '' && vars.SOURCE_BRANCH || 'main' }}
          name: ${{ vars.SOURCE_ARTIFACT != '' && vars.SOURCE_ARTIFACT || 'allure-results' }}
          path: incoming/allure-results
          if_no_artifact_found: fail

      - name: Download dispatched k6 JSON artifact by run id
        if: ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_artifact == 'k6-json' }}
        id: download-dispatch-k6
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.SOURCE_REPO_TOKEN != '' && secrets.SOURCE_REPO_TOKEN || github.token }}
          repo: ${{ github.event.client_payload.source_repo }}
          workflow: ${{ github.event.client_payload.source_workflow }}
          run_id: ${{ github.event.client_payload.source_run_id }}
          name: k6-json
          path: incoming/k6-json
          if_no_artifact_found: fail

      - name: Extract normalized summary
        if: ${{ (github.event_name == 'repository_dispatch' && github.event.client_payload.source_artifact == 'allure-results') || (github.event_name != 'repository_dispatch' && vars.SOURCE_REPO != '' && vars.SOURCE_WORKFLOW != '') }}
        run: |
          python scripts/extract_qa_template_summary.py \
            --allure-dir incoming/allure-results \
            --output-dir data/projects \
            --run-id ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_run_id || format('gha-{0}', github.run_id) }} \
            --run-url ${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_run_url || format('https://github.com/{0}/actions/runs/{1}', github.repository, github.run_id) }} \
            --workflow "Update Data And Deploy" \
            --branch "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_branch || (vars.SOURCE_BRANCH != '' && vars.SOURCE_BRANCH || github.ref_name) }}" \
            --commit-sha "${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_commit_sha || github.sha }}" \
            --repo-url "https://github.com/${{ github.event_name == 'repository_dispatch' && github.event.client_payload.source_repo || vars.SOURCE_REPO }}"

      - name: Fetch Playwright CI status
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.client_payload.source_repo }}" = "DaniHogg/playwright-fundamentals" ]; then
            python scripts/fetch_playwright_status.py \
              --output-dir data/projects \
              --run-id "${{ github.event.client_payload.source_run_id }}" \
              --run-url "${{ github.event.client_payload.source_run_url }}" \
              --branch "${{ github.event.client_payload.source_branch }}" \
              --commit-sha "${{ github.event.client_payload.source_commit_sha }}" \
              --results-json incoming/playwright-json/results.json
          else
            python scripts/fetch_playwright_status.py \
              --output-dir data/projects
          fi
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Fetch Selenium CI status
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.client_payload.source_repo }}" = "DaniHogg/Selenium" ]; then
            python scripts/fetch_selenium_status.py \
              --output-dir data/projects \
              --run-id "${{ github.event.client_payload.source_run_id }}" \
              --run-url "${{ github.event.client_payload.source_run_url }}" \
              --branch "${{ github.event.client_payload.source_branch }}" \
              --commit-sha "${{ github.event.client_payload.source_commit_sha }}" \
              --results-json incoming/selenium-json/report.json
          else
            python scripts/fetch_selenium_status.py \
              --output-dir data/projects
          fi
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Fetch API-testing-pytest CI status
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.client_payload.source_repo }}" = "DaniHogg/API-testing-pytest" ]; then
            python scripts/fetch_api_pytest_status.py \
              --output-dir data/projects \
              --run-id "${{ github.event.client_payload.source_run_id }}" \
              --run-url "${{ github.event.client_payload.source_run_url }}" \
              --branch "${{ github.event.client_payload.source_branch }}" \
              --commit-sha "${{ github.event.client_payload.source_commit_sha }}"
          else
            python scripts/fetch_api_pytest_status.py \
              --output-dir data/projects
          fi
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Fetch Postman CI status
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.client_payload.source_repo }}" = "DaniHogg/Postman-API-Tests" ]; then
            python scripts/fetch_postman_status.py \
              --output-dir data/projects \
              --run-id "${{ github.event.client_payload.source_run_id }}" \
              --run-url "${{ github.event.client_payload.source_run_url }}" \
              --branch "${{ github.event.client_payload.source_branch }}" \
              --commit-sha "${{ github.event.client_payload.source_commit_sha }}"
          else
            python scripts/fetch_postman_status.py \
              --output-dir data/projects
          fi
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Fetch k6 CI status
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ "${{ github.event.client_payload.source_repo }}" = "DaniHogg/k6-performance-tests" ]; then
            python scripts/fetch_k6_status.py \
              --output-dir data/projects \
              --run-id "${{ github.event.client_payload.source_run_id }}" \
              --run-url "${{ github.event.client_payload.source_run_url }}" \
              --branch "${{ github.event.client_payload.source_branch }}" \
              --commit-sha "${{ github.event.client_payload.source_commit_sha }}" \
              --results-json incoming/k6-json/k6-results.json
          else
            python scripts/fetch_k6_status.py \
              --output-dir data/projects
          fi
        env:
          SOURCE_REPO_TOKEN: ${{ secrets.SOURCE_REPO_TOKEN }}

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/projects
          if ! git diff --staged --quiet; then
            git commit -m "chore: refresh portfolio report data"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
